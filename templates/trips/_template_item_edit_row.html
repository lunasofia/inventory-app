<li class="trip-card item-row editing" id="titem-{{ item.pk }}">
  <form class="item-edit-form"
        hx-post="{% url 'template_item_edit' template.pk item.pk %}"
        hx-target="#template-items" hx-swap="outerHTML">
    {{ form.name }}
    {{ form.quantity }}
    {{ form.category }}
    <button class="btn primary" type="submit">Save</button>
    <button class="btn" type="button"
            hx-get="{% url 'template_item_row' template.pk item.pk %}"
            hx-target="#titem-{{ item.pk }}" hx-swap="outerHTML">Cancel</button>
  </form>
  {% if form.errors %}<p class="field-error">{{ form.name.errors.0 }}{{ form.quantity.errors.0 }}</p>{% endif %}
</li>
