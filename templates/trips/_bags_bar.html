<div class="bags-bar">
  <span class="muted">Bags:</span>
  <div class="bags-list">
    {% for bag in bags %}{% include 'trips/_bag_chip.html' %}{% endfor %}
    <form class="add-bag-form" hx-post="{% url 'bag_create' trip.pk %}"
          hx-target="#planning" hx-swap="outerHTML">
      {{ bag_form.name }}
      <button class="btn" type="submit">+ Bag</button>
    </form>
  </div>
  {% if bag_form.errors %}<p class="field-error">{{ bag_form.name.errors.0 }}</p>{% endif %}
</div>
