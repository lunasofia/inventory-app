{% extends 'base.html' %}
{% block title %}Delete {{ template.name }} · Packlist{% endblock %}
{% block content %}
<div class="card narrow">
  <h1>Delete this template?</h1>
  <p>You're about to delete <strong>{{ template.name }}</strong>. Trips already created from it are unaffected. This can't be undone.</p>
  <form method="post">
    {% csrf_token %}
    <div class="form-actions">
      <button type="submit" class="btn danger">Delete template</button>
      <a class="btn" href="{% url 'template_detail' template.pk %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
