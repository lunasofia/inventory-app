{% extends 'base.html' %}
{% block title %}Delete {{ trip.name }} · Packwell{% endblock %}
{% block content %}
<div class="card narrow">
  <h1>Delete this trip?</h1>
  <p>You're about to permanently delete <strong>{{ trip.name }}</strong> and its packing list. This can't be undone.</p>
  <form method="post">
    {% csrf_token %}
    <div class="form-actions">
      <button type="submit" class="btn danger">Delete trip</button>
      <a class="btn" href="{% url 'trip_detail' trip.pk %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
