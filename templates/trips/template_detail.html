{% extends 'base.html' %}
{% block title %}{{ template.name }} · Templates · Packlist{% endblock %}
{% block content %}
<div class="page-head">
  <div>
    <h1>{{ template.name }}</h1>
    {% if template.description %}<p class="muted">{{ template.description }}</p>{% endif %}
  </div>
  <div class="form-actions">
    <a class="btn" href="{% url 'template_edit' template.pk %}">Edit details</a>
    <a class="btn" href="{% url 'template_delete' template.pk %}">Delete</a>
  </div>
</div>

<section>
  <h2>Items</h2>
  {% include 'trips/_template_items.html' %}
</section>
{% endblock %}
