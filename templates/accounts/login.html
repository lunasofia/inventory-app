{% extends 'base.html' %}
{% block title %}Log in · Packlist{% endblock %}
{% block content %}
<div class="card narrow">
  <h1>Log in</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn primary">Log in</button>
  </form>
  <p class="muted">No account? <a href="{% url 'register' %}">Sign up</a>.</p>
</div>
{% endblock %}
