<li class="trip-card item-row" id="item-{{ item.pk }}">
  <span class="item-main">
    {% if item.packed %}<span class="packed-dot" title="Packed">✓</span>{% endif %}
    {{ item.quantity }}× {{ item.name }}
    {% if item.bag %}<span class="bag-tag">{{ item.bag.name }}</span>{% endif %}
  </span>
  {% if can_edit %}
    <span class="item-actions">
      <button class="linkbtn" type="button"
              hx-get="{% url 'item_edit' item.trip_id item.pk %}"
              hx-target="#item-{{ item.pk }}" hx-swap="outerHTML">Edit</button>
      <button class="linkbtn danger" type="button"
              hx-post="{% url 'item_delete' item.trip_id item.pk %}"
              hx-target="#planning" hx-swap="outerHTML"
              hx-confirm="Remove {{ item.name }}?">Remove</button>
    </span>
  {% endif %}
</li>
